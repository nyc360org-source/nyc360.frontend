<div class="leader-modal-backdrop" (click)="closeModal()">
  <div class="leader-modal-card" (click)="$event.stopPropagation()">
    <header class="modal-header">
      <h2>Apply For Community Leader</h2>
      <button type="button" class="close-btn" (click)="closeModal()" aria-label="Close modal">
        <i class="bi bi-x-lg"></i>
      </button>
    </header>

    <form [formGroup]="leaderApplicationForm" (ngSubmit)="submit()" class="modal-form">
      <div class="modal-body">
      <section class="modal-section">
        <h3><span class="step-dot">1</span>Applicant Information</h3>

        <label>Full Name</label>
        <input type="text" formControlName="fullName" placeholder="Jane Doe" />

        <div class="inline-grid">
          <div>
            <label>Email Address</label>
            <input type="email" formControlName="email" placeholder="jane@gmail.com" />
          </div>
          <div>
            <label>Phone Number</label>
            <input type="text" formControlName="phoneNumber" placeholder="(555) 000 - 0000" />
          </div>
        </div>
      </section>

      <section class="modal-section">
        <h3><span class="step-dot">2</span>Community Details</h3>

        <label>Community Name</label>
        <input type="text" formControlName="communityName" placeholder="e.g. Upper West Side Neighbors" />

        <label>Borough / Neighborhood</label>
        <select formControlName="location">
          <option value="" disabled>Select a location</option>
          <option *ngFor="let option of locationOptions" [value]="option">{{ option }}</option>
        </select>
      </section>

      <section class="modal-section">
        <h3><span class="step-dot">3</span>Verification</h3>

        <label>Identity Verification (Upload ID or Utility Bill)</label>
        <div class="drop-zone" [class.dragging]="isDraggingFile" (dragover)="onDragOver($event)"
          (dragleave)="onDragLeave($event)" (drop)="onDrop($event)">
          <i class="bi bi-cloud-arrow-up"></i>
          <p>{{ selectedVerificationFile ? selectedVerificationFile.name : 'Drag and drop here' }}</p>
          <small>Supports JPEG, PNG, PDF. Max file size 10MB.</small>
          <input #fileInput type="file" hidden accept=".jpg,.jpeg,.png,.pdf" (change)="onFileSelected($event)" />
          <button type="button" (click)="fileInput.click()">Select Files</button>
        </div>

        <label>Why do you want to lead this community?</label>
        <input type="text" formControlName="profileLink" placeholder="https://....." />
      </section>

      <section class="modal-section">
        <h3><span class="step-dot">4</span>Motivation & Experience</h3>

        <label>Why do you want to lead this community?</label>
        <textarea rows="4" formControlName="motivation"></textarea>

        <label>Describe any relevant community or leadership experience</label>
        <textarea rows="4" formControlName="experience"></textarea>

        <label class="group-label">Have you led a community group before?</label>
        <div class="radio-group lead-history-options">
          <label class="option-pill">
            <input type="radio" formControlName="ledBefore" value="public" />
            <span>Public</span>
          </label>
          <label class="option-pill">
            <input type="radio" formControlName="ledBefore" value="private" />
            <span>Private</span>
          </label>
        </div>

        <label class="group-label">Weekly Moderation Availability</label>
        <div class="availability-grid availability-options">
          <label class="option-pill"><input type="radio" formControlName="weeklyAvailability" value="1-3" /><span>1-3 hours / week</span></label>
          <label class="option-pill"><input type="radio" formControlName="weeklyAvailability" value="4-7" /><span>4-7 hours / week</span></label>
          <label class="option-pill"><input type="radio" formControlName="weeklyAvailability" value="8-12" /><span>8-12 hours / week</span></label>
          <label class="option-pill"><input type="radio" formControlName="weeklyAvailability" value="10+" /><span>+10 hours / week</span></label>
        </div>

        <label class="agreement agreement-card">
          <input type="checkbox" formControlName="agreedToGuidelines" />
          <span>
            I agree to the <strong>NYC360 Community Guidelines</strong> and understand that my role as a leader
            involves maintaining a safe, inclusive, and productive environment for all members.
          </span>
        </label>
      </section>
      </div>

      <footer class="modal-footer">
        <div class="response-time response-time-card">
          <small>RESPONSE TIME</small>
          <strong>Avg. 4 hours</strong>
        </div>
        <button type="submit" class="submit-btn">Submit Application <i class="bi bi-arrow-right"></i></button>
      </footer>
    </form>
  </div>
</div>
